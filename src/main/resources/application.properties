
spring.application.name=rentacar

# H2 in-memory (temporar pentru toata aplicatia; Oracle il adaugam mai tarziu)
spring.datasource.url=jdbc:h2:mem:rentacar;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 porneste goala -> lasa Hibernate sa creeze schema din entitati
spring.jpa.hibernate.ddl-auto=create-drop

# afiseaza SQL-ul generat (util la invatat/debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# consola web a H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true

spring.mvc.format.date=iso