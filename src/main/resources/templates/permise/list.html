<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head th:replace="~{fragments/layout :: head('Permise')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main>
    <h1>Permise de conducere</h1>
    <a th:href="@{/permise/nou}">+ Adauga permis</a>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Numar
                <a th:href="@{/permise(size=${page.size}, sort='numarPermis,asc')}">&#9650;</a>
                <a th:href="@{/permise(size=${page.size}, sort='numarPermis,desc')}">&#9660;</a></th>
            <th>Categorie</th>
            <th>Tara</th>
            <th>Emitere</th>
            <th>Expirare
                <a th:href="@{/permise(size=${page.size}, sort='dataExpirare,asc')}">&#9650;</a>
                <a th:href="@{/permise(size=${page.size}, sort='dataExpirare,desc')}">&#9660;</a></th>
            <th>Client</th>
            <th>Actiuni</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${page.content}">
            <td th:text="${p.idPermis}"></td>
            <td th:text="${p.numarPermis}"></td>
            <td th:text="${p.categoriePrincipala}"></td>
            <td th:text="${p.taraEmitenta}"></td>
            <td th:text="${p.dataEmitere}"></td>
            <td th:text="${p.dataExpirare}"></td>
            <td th:text="${p.client != null ? p.client.nume + ' ' + p.client.prenume : ''}"></td>
            <td>
                <a th:href="@{/permise/{id}/editare(id=${p.idPermis})}">Editeaza</a>
                <form th:action="@{/permise/{id}/sterge(id=${p.idPermis})}" method="post"
                      style="display:inline" onsubmit="return confirm('Sigur stergi?');">
                    <button type="submit">Sterge</button>
                </form>
            </td>
        </tr>
        <tr th:if="${page.content.isEmpty()}"><td colspan="8">Niciun permis inca.</td></tr>
        </tbody>
    </table>
    <div class="pagination" th:if="${page.totalPages > 1}">
        <a th:if="${!page.first}" th:href="@{/permise(page=${page.number-1}, size=${page.size}, sort=${param.sort})}">&laquo; Anterior</a>
        <span>Pagina [[${page.number + 1}]] din [[${page.totalPages}]]</span>
        <a th:if="${!page.last}" th:href="@{/permise(page=${page.number+1}, size=${page.size}, sort=${param.sort})}">Urmator &raquo;</a>
    </div>
</main>
</body>
</html>
