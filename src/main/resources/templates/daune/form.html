<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head th:replace="~{fragments/layout :: head('Dauna')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main>
    <h1 th:text="${dauna.idDauna} == null ? 'Adauga dauna' : 'Editeaza dauna'">Dauna</h1>
    <form th:action="@{/daune/salveaza}" th:object="${dauna}" method="post">
        <input type="hidden" th:field="*{idDauna}">
        <p><label>Contract:</label>
            <select th:field="*{contract}">
                <option value="">-- alege --</option>
                <option th:each="c : ${contracte}" th:value="${c.idContract}"
                        th:text="'#' + ${c.idContract} + ' - ' + ${c.client.nume} + ' ' + ${c.client.prenume}"></option>
            </select>
            <span th:if="${#fields.hasErrors('contract')}" th:errors="*{contract}" style="color:red"></span></p>
        <p><label>Descriere:</label>
            <input type="text" th:field="*{descriere}">
            <span th:if="${#fields.hasErrors('descriere')}" th:errors="*{descriere}" style="color:red"></span></p>
        <p><label>Cost:</label>
            <input type="number" step="0.01" th:field="*{cost}">
            <span th:if="${#fields.hasErrors('cost')}" th:errors="*{cost}" style="color:red"></span></p>
        <p><label>Status:</label>
            <select th:field="*{status}">
                <option value="deschisa">deschisa</option>
                <option value="inchisa">inchisa</option>
                <option value="anulata">anulata</option>
            </select>
            <span th:if="${#fields.hasErrors('status')}" th:errors="*{status}" style="color:red"></span></p>
        <p><label>Responsabil:</label>
            <select th:field="*{responsabil}">
                <option value="client">client</option>
                <option value="firma">firma</option>
                <option value="necunoscut">necunoscut</option>
            </select>
            <span th:if="${#fields.hasErrors('responsabil')}" th:errors="*{responsabil}" style="color:red"></span></p>
        <button type="submit">Salveaza</button>
        <a th:href="@{/daune}">Anuleaza</a>
    </form>
</main>
</body>
</html>
