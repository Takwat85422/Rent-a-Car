<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head th:replace="~{fragments/layout :: head('Clienti')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main>
    <h1>Clienti</h1>
    <a th:if="${isAdmin}" th:href="@{/clienti/nou}">+ Adauga client</a>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nume
                <a th:href="@{/clienti(size=${page.size}, sort='nume,asc')}">&#9650;</a>
                <a th:href="@{/clienti(size=${page.size}, sort='nume,desc')}">&#9660;</a></th>
            <th>Prenume</th>
            <th>CNP</th>
            <th>Email</th>
            <th>Telefon</th>
            <th>Status
                <a th:href="@{/clienti(size=${page.size}, sort='statusClient,asc')}">&#9650;</a>
                <a th:href="@{/clienti(size=${page.size}, sort='statusClient,desc')}">&#9660;</a></th>
            <th>Permis</th>
            <th>Actiuni</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${page.content}">
            <td th:text="${c.idClient}"></td>
            <td th:text="${c.nume}"></td>
            <td th:text="${c.prenume}"></td>
            <td th:text="${c.cnp}"></td>
            <td th:text="${c.email}"></td>
            <td th:text="${c.telefon}"></td>
            <td th:text="${c.statusClient}"></td>
            <td th:text="${c.permis != null ? c.permis.numarPermis : '-'}"></td>
            <td>
                <span th:if="${isAdmin}">
                <a th:href="@{/clienti/{id}/editare(id=${c.idClient})}">Editeaza</a>
                <form th:action="@{/clienti/{id}/sterge(id=${c.idClient})}" method="post"
                      style="display:inline" onsubmit="return confirm('Sigur stergi?');">
                    <button type="submit">Sterge</button>
                </form>
                </span>
            </td>
        </tr>
        <tr th:if="${page.content.isEmpty()}"><td colspan="9">Niciun client inca.</td></tr>
        </tbody>
    </table>
    <div class="pagination" th:if="${page.totalPages > 1}">
        <a th:if="${!page.first}" th:href="@{/clienti(page=${page.number-1}, size=${page.size}, sort=${param.sort})}">&laquo; Anterior</a>
        <span>Pagina [[${page.number + 1}]] din [[${page.totalPages}]]</span>
        <a th:if="${!page.last}" th:href="@{/clienti(page=${page.number+1}, size=${page.size}, sort=${param.sort})}">Urmator &raquo;</a>
    </div>
</main>
</body>
</html>
