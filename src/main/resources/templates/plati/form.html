<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head th:replace="~{fragments/layout :: head('Plata')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main>
    <h1 th:text="${plata.idPlata} == null ? 'Adauga plata' : 'Editeaza plata'">Plata</h1>
    <form th:action="@{/plati/salveaza}" th:object="${plata}" method="post">
        <input type="hidden" th:field="*{idPlata}">
        <p><label>Contract:</label>
            <select th:field="*{contract}">
                <option value="">-- alege --</option>
                <option th:each="c : ${contracte}" th:value="${c.idContract}"
                        th:text="'#' + ${c.idContract} + ' - ' + ${c.client.nume} + ' ' + ${c.client.prenume}"></option>
            </select>
            <span th:if="${#fields.hasErrors('contract')}" th:errors="*{contract}" style="color:red"></span></p>
        <p><label>Suma:</label>
            <input type="number" step="0.01" th:field="*{suma}">
            <span th:if="${#fields.hasErrors('suma')}" th:errors="*{suma}" style="color:red"></span></p>
        <p><label>Metoda:</label>
            <select th:field="*{metoda}">
                <option value="">-- alege --</option>
                <option value="cash">cash</option>
                <option value="card">card</option>
                <option value="transfer">transfer</option>
            </select>
            <span th:if="${#fields.hasErrors('metoda')}" th:errors="*{metoda}" style="color:red"></span></p>
        <p><label>Status:</label>
            <select th:field="*{status}">
                <option value="confirmata">confirmata</option>
                <option value="in_asteptare">in_asteptare</option>
                <option value="respinsa">respinsa</option>
            </select>
            <span th:if="${#fields.hasErrors('status')}" th:errors="*{status}" style="color:red"></span></p>
        <button type="submit">Salveaza</button>
        <a th:href="@{/plati}">Anuleaza</a>
    </form>
</main>
</body>
</html>
